project:
  name: "marketing_roi_optimizer"
  version: "0.1.0"
  author: "Lorin Kakahoun"

paths:
  data_raw: "data/raw/dummy_data_hss.csv"
  data_processed: "data/processed/"
  models: "outputs/models/"
  figures: "outputs/figures/"
  reports: "outputs/reports/"

data:
  target: "Sales"
  features_num: ["TV", "Radio", "Social Media"]
  features_cat: ["Influencer"]
  test_size: 0.2
  random_state: 42
  cv_folds: 5

models:
  random_state: 42
  linear_regression: {}
  random_forest:
    n_estimators: 100
    max_depth: 10
  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
  mlp:
    hidden_layers: [64, 32, 16]
    epochs: 100
    batch_size: 32
    learning_rate: 0.001

api:
  host: "0.0.0.0"
  port: 8000

dashboard:
  port: 8501
